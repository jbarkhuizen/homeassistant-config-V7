title: Security & Maintenance
views:
  - title: Security
    path: security
    icon: mdi:shield-check
    cards:
      - type: markdown
        title: Security Overview
        content: |
          **Login & Ban Metrics**
          - Bad Logins Total: {{ states('sensor.badlogin') }}
          - Yesterday Baseline: {{ states('input_number.badlogin_previous_count') }}
          - IP Bans Current: {{ states('sensor.home_assistant_ip_bans_count') }}
          - IP Bans Baseline: {{ states('input_number.ipbans_previous_count') }}
          - Updates Available: {{ state_attr('sensor.home_assistant_updates_summary','total_updates') }}

      - type: entities
        title: Security Counters & Flags
        entities:
          - sensor.badlogin
          - input_number.badlogin_previous_count
          - sensor.home_assistant_ip_bans_count
          - input_number.ipbans_previous_count
          - binary_sensor.updates_available

      - type: markdown
        title: Maintenance State
        content: |
          - Maintenance Mode: {{ states('input_boolean.maintenance_mode') }}
          - Last Auto Update: {{ state_attr('sensor.auto_update_status','last_run') }}
          - Auto Update Status: {{ states('sensor.auto_update_status') }}
          - Backup Health: {{ states('sensor.backup_health_status') }} (Last success: {{ state_attr('sensor.backup_health_status','last_success') }})

      - type: entities
        title: Maintenance Health
        entities:
          - sensor.auto_update_status
          - sensor.backup_health_status
          - sensor.home_assistant_log_size_mb
          - binary_sensor.home_assistant_log_has_errors

      - type: statistics-graph
        title: Log Error Presence (48h)
        chart_type: line
        period: hour
        days_to_show: 2
        stat_types:
          - sum
        entities:
          - sensor.log_errors_on_hours_48h

  - title: Add-On Health
    path: addons
    icon: mdi:cube-outline
    cards:
      - type: glance
        title: Add-ons Running State
        columns: 4
        entities:
          - binary_sensor.node_red_running
          - binary_sensor.grafana_running
          - binary_sensor.influxdb_running
          - binary_sensor.adguard_home_running
          - binary_sensor.mosquitto_broker_running
          - binary_sensor.studio_code_server_running
          - binary_sensor.samba_share_running
          - binary_sensor.matter_server_running

      - type: entities
        title: HTTP Health (Node-RED & Grafana)
        entities:
          - sensor.node_red_http_status_code
          - sensor.grafana_http_status_code

  - title: Database & Logs
    path: db_logs
    icon: mdi:database
    cards:
      - type: markdown
        title: DB Overview
        content: |
          - Current DB Size: {{ states('sensor.homeassistant_db_size_mb') }} MB
          - Baseline: {{ states('input_number.homeassistant_db_baseline_mb') }} MB
          - Growth Threshold %: {{ states('input_number.homeassistant_db_growth_threshold_percent') }}%
          - Daily Check Status Sensor: (Uses automation logs)
      - type: entities
        title: DB & Log Widgets
        entities:
          - sensor.homeassistant_db_size_mb
          - input_number.homeassistant_db_baseline_mb
          - input_number.homeassistant_db_growth_threshold_percent
          - sensor.home_assistant_log_size
          - sensor.home_assistant_log_size_mb
          - binary_sensor.home_assistant_log_has_errors

      - type: statistics-graph
        title: DB Size Trend (7 days)
        chart_type: line
        period: day
        days_to_show: 7
        stat_types:
          - mean
        entities:
          - sensor.homeassistant_db_size_mb

      - type: statistics-graph
        title: Log Size Trend (7 days)
        chart_type: line
        period: day
        days_to_show: 7
        stat_types:
          - mean
        entities:
          - sensor.home_assistant_log_size_mb