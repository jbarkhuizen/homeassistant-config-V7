name: Home Assistant Configuration CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Validate integration metadata and common issues
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

      # Validate Home Assistant configuration (no secrets required because we ignore secrets.yaml)
      - name: Home Assistant configuration check
        uses: home-assistant/actions/configuration@master
        with:
          path: .