# ==============================================================================
# Logger Configuration
# ==============================================================================
logger:
  default: warning
  logs:
    # TEMP (for Deye entry_id discovery): log config entries at startup
    homeassistant.config_entries: debug

    # Core Components - Set to info for better debugging
    homeassistant.core: info
    homeassistant.components.http: warning
    homeassistant.loader: warning
    homeassistant.setup: info
    homeassistant.config: info
    homeassistant.components.smtp: debug
    aiosmtplib: debug
    
    # Automation & Scripts - Info level for troubleshooting
    homeassistant.components.automation: info
    homeassistant.components.script: info
    
    # Integration-specific
    homeassistant.components.mqtt: info
    homeassistant.components.tuya: info
    homeassistant.components.telegram: info
    homeassistant.components.notify: info
    
    # Custom Components - Reduce only problematic ones to error
    custom_components.alexa_media: warning
    custom_components.localtuya: warning
    custom_components.powercalc: warning
    custom_components.solcast_solar: info
    custom_components.deye: info
    custom_components.sunsunk: info
    custom_components.sonoff: info
    custom_components.hacs: info
    
    # Database & History - Keep at warning
    homeassistant.components.recorder: warning
    homeassistant.components.history: warning
    homeassistant.components.influxdb: info
    
    # Network - Info for device tracking
    homeassistant.components.network: info
    homeassistant.components.websocket: warning
    
    # System Health
    homeassistant.components.system_health: warning
    homeassistant.components.updater: warning
    homeassistant.components.homeassistant: info
    
    # Utilities
    homeassistant.util.dt: warning
    homeassistant.util.yaml: warning
    homeassistant.helpers.entity: warning
    homeassistant.helpers.entity_registry: warning
    homeassistant.helpers.device_registry: warning
    
    # External Libraries
    urllib3.connectionpool: error
    requests.packages.urllib3.connectionpool: error
    aiohttp.access: error

recorder:
  purge_keep_days: 360
  auto_purge: true
  auto_repack: true
  commit_interval: 10
  include:
    domains:
      - climate
      - person
      - device_tracker
      - sensor
      - switch
      - light
      - automation
      - script
    entities:
      # Security / Monitoring
      - sensor.badlogin
      - sensor.homeassistant_db_size_mb
      - sensor.home_assistant_ip_bans_count
      - sensor.node_red_http_status_code
      - sensor.grafana_http_status_code
      # Inverter SoC and Power (Master/Slave/Combined)
      - sensor.deyeinvertermaster_battery_soc
      - sensor.deyeinverterslave_battery_soc
      - sensor.deyeinvertermaster_pv_power
      - sensor.deyeinverterslave_pv_power
      - sensor.deyeinvertermaster_inverter_output_power
      - sensor.deyeinverterslave_inverter_output_power
      - sensor.deyeinvertermaster_non_essential_load
      - sensor.deyeinverterslave_non_essential_load
      - sensor.deyeinvertermaster_grid_power_ct_clamp
      - sensor.deyeinverterslave_grid_power_ct_clamp
      - sensor.deyeinvertermaster_battery_output_power
      - sensor.deyeinverterslave_battery_output_power
      - sensor.deyeinvertermaster_generator_port_power
      # Daily summaries (if present)
      - sensor.deyeinvertermaster_today_energy_bought
      - sensor.deyeinvertermaster_today_energy_sold
      - sensor.deyeinvertermaster_today_load_consumption
      - sensor.deyeinverterslave_today_energy_bought
      - sensor.deyeinverterslave_today_energy_sold
      - sensor.deyeinverterslave_today_load_consumption
    # (4) ADDED: Solar Forecast new sensors for trend persistence
      - sensor.solar_forecast_total_today
      - sensor.solar_forecast_remaining_today
      - sensor.solar_forecast_total_tomorrow
      - sensor.solar_forecast_quality_today
      - sensor.solar_forecast_accuracy_so_far
      - sensor.solar_recommended_load_slots_today
      - sensor.solar_forecast_peak_power_estimate
      - sensor.solar_forecast_action_recommendation
    # (ADDED MQTT Dashboard) Persist key MQTT resource sensors
      - sensor.mosquitto_broker_cpu_percent
      - sensor.mosquitto_broker_memory_percent
      - sensor.system_monitor_network_in_enp2s0
      - sensor.system_monitor_network_out_enp2s0
      - sensor.system_monitor_network_throughput_in_enp2s0
      - sensor.system_monitor_network_throughput_out_enp2s0
    # (5) ADDED: MQTT Health Sensors for history/trend
      - sensor.mqtt_broker_health_state
      - sensor.mqtt_broker_cpu_state_detail
      - sensor.mqtt_broker_memory_state_detail
      - binary_sensor.mqtt_broker_alert_active
    entity_globs:
      - sensor.deyeinverter*_pv_power
      - sensor.deyeinverter*_inverter_output_power
      - sensor.deyeinverter*_non_essential_load
      - sensor.deyeinverter*_grid_power_ct_clamp
      - sensor.deyeinverter*_battery_output_power
      - sensor.deyeinverter*_battery_soc
  exclude:
    domains:
      - updater
      - sun
      - media_player
    entities:
      - sensor.date_time
      - sensor.time
      - sensor.date_time_utc
      - sensor.date_time_iso
      - sensor.time_date
      - sensor.uptime
      - sensor.time_utc
      - sensor.last_boot
      - sensor.processor_use
      - sensor.processor_temperature
      - sensor.memory_use_percent
      - sensor.swap_use_percent
      - sensor.load_1m
      - sensor.load_5m
      - sensor.load_15m
      - sensor.speedtest_download
      - sensor.speedtest_upload
      - sensor.speedtest_ping
    entity_globs:
      - sensor.*_update_available
      - sensor.hacs_*
      - binary_sensor.hacs_*
      - sensor.openweathermap_*
      - sensor.weather_*
      - device_tracker.unknown_*
      - sensor.node_red_*
      - sensor.telegram_*
      - sensor.spotify_*
