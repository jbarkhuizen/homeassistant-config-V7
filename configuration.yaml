# ==============================================================================
# Home Assistant Main Configuration
# File: configuration.yaml
# Updated: 2025-10-21
# ==============================================================================

# Loads default set of integrations. Do not remove.
default_config:
homeassistant:
  # Basic instance information
  name: "Smart Home - Pierre van Ryneveld"
  latitude: -25.84051
  longitude: 28.24814
  elevation: 1519
  unit_system: metric
  time_zone: Africa/Johannesburg
  country: ZA
  currency: ZAR
  
  # Network configuration for your static IP setup
  internal_url: "http://192.168.1.30:8123"
  external_url: "https://gy98slwcfto2t5oia2xnqjeabx480gs6.ui.nabu.casa/"
  
  # File system access
  allowlist_external_dirs:
    - "/config/sensor_reports"
    - "/config/scripts"
    - "/tmp"
    - "/config/exports"
    - "/config/entity_exports"
    - "/config/backup"
  # Packages configuration - This will now be loaded correctly.
  packages: !include_dir_named packages
#=======================================================================================
# Load frontend themes from the themes folder
#=======================================================================================
frontend:
  themes: !include_dir_merge_named themes
  extra_module_url:
    - /hacsfiles/lovelace-card-mod/card-mod.js
# ==============================================================================
# Text to Speech
# ==============================================================================
tts:
  - platform: google_translate  
    service_name: google_say
# ==============================================================================
# Load Automations, Scripts, Scenes, etc.
# ==============================================================================
# automation: !include automations.yaml
automation: !include_dir_merge_list automations
script: !include scripts.yaml
scene: !include scenes.yaml
template: !include template.yaml
group: !include groups.yaml
#=======================================================================================
# SmartHome Integrations
# https://github.com/tomatensaus/DeyeSolarDesktop/blob/main/configuration.yaml
sensor:
  - platform: integration
    name: deyeinvertermaster_summary_total_battery_charge_grid
    source: sensor.deyeinvertermaster_battery_charge_grid_power
    method: left

  - platform: integration
    name: deyeinverterslave_summary_total_battery_charge_grid
    source: sensor.deyeinverterslave_battery_charge_grid_power
    method: left
#=======================================================================================
# The sensor below keeps the minimum soc of the battery for the last 12 hours,
# only removed from DeyeSolarDesktop, not important

  - platform: statistics
    name: "min_soc_battery"
#    entity_id: sensor.deyeinverter_battery_soc
    entity_id: sensor.deyeinvertercombined_battery_soc
    state_characteristic: value_min
    max_age:
      hours: 12
    sampling_size: 144
#=======================================================================================
# SmartHome Integrations
# https://github.com/tomatensaus/DeyeSolarDesktop/blob/main/configuration.yaml

utility_meter:
  master_energy_battery_charge_grid:
    name: deyeinvertermaster_summary_day_battery_charge_grid
    source: sensor.deyeinvertermaster_summary_total_battery_charge_grid
    cycle: daily

  slave_energy_battery_charge_grid:
    name: deyeinverterslave_summary_day_battery_charge_grid
    source: sensor.deyeinverterslave_summary_total_battery_charge_grid
    cycle: daily
#=======================================================================================
# ==============================================================================
# HTTP Configuration - Secure and Optimized
# ==============================================================================
http:
  # Core security settings
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.1.0/24
    - 127.0.0.1
    - ::1
  
  # CORS configuration for your static IP and local access
  cors_allowed_origins:
    - "https://192.168.1.30:8123"
    - "http://192.168.1.30:8123"
    - "http://localhost:8123"
    - "http://127.0.0.1:8123"
    - "https://my.home-assistant.io"
  
  # Security settings
  login_attempts_threshold: 5
  ip_ban_enabled: true
  use_x_frame_options: true
  
  # SSL profile for better security
  ssl_profile: modern

# ==============================================================================
# Pyscript Integration
# ==============================================================================  
pyscript:
  allow_all_imports: true
  hass_is_global: true

# ==============================================================================
# Command Line Sensor
# ==============================================================================
command_line:
#  - sensor:
#      name: Badlogin
#      command: "grep -c 'Login attempt' /home/hass/.homeassistant/home-assistant.log"
  - sensor:
      name: Badlogin
      command: "grep 'Login attempt' /config/home-assistant.log | wc -l"
      value_template: "{{ value | int }}"
      unit_of_measurement: "events"
      scan_interval: 300
  - sensor:
      name: Homeassistant DB Size MB
      command: "stat -c %s /config/home-assistant_v2.db 2>/dev/null || echo 0"
      value_template: "{{ (value | int / 1048576) | round(2) }}"
      unit_of_measurement: "MB"
      scan_interval: 600
# ==============================================================================
  # Count of banned IPs (lines with 'ip_address' in ip_bans.yaml)
  # Added with GitHib Copilot GPT 5 on 9 Nov 2025
# ==============================================================================
  - sensor:
      name: Home Assistant IP Bans Count
      command: "grep -c 'ip_address' /config/ip_bans.yaml 2>/dev/null || echo 0"
      value_template: "{{ value | int }}"
      unit_of_measurement: "bans"
      scan_interval: 600
# ==============================================================================
  # Node-RED HTTP health (expects 200)
  # Added with GitHib Copilot GPT 5 on 9 Nov 2025
# ==============================================================================
  - sensor:
      name: Node-RED HTTP Status Code
      command: "curl -s -o /dev/null -w '%{http_code}' http://a0d7b954-nodered:1880/ || echo 000"
      value_template: "{{ value | int }}"
      unit_of_measurement: "code"
      scan_interval: 300
# ==============================================================================
  # Grafana HTTP health (expects 200)
  # Added with GitHib Copilot GPT 5 on 9 Nov 2025
# ==============================================================================
  - sensor:
      name: Grafana HTTP Status Code
      command: "curl -s -o /dev/null -w '%{http_code}' http://a0d7b954-grafana:3000/api/health || echo 000"
      value_template: "{{ value | int }}"
      unit_of_measurement: "code"
      scan_interval: 300

# ==============================================================================
# INPUT NUMBERS
# (4) ADDED: DB baseline
# (5) ADDED: Growth threshold percent (adjustable)
# ==============================================================================
input_number:
  badlogin_previous_count:
    name: Badlogin Previous Count
    min: 0
    max: 100000
    step: 1
    mode: box
    icon: mdi:shield-key
  homeassistant_db_baseline_mb:
    name: HA DB Baseline MB
    min: 0
    max: 100000
    step: 0.01
    mode: box
    icon: mdi:database
  homeassistant_db_growth_threshold_percent:
    name: HA DB Growth Threshold %
    min: 5
    max: 100
    step: 1
    mode: slider
    icon: mdi:chart-line
    # Default threshold (20%) will be set manually after restart if needed.
# (1) ADDED: MQTT Broker Alert Thresholds
  mqtt_broker_cpu_alert_threshold:
    name: MQTT CPU Alert Threshold %
    min: 0
    max: 100
    step: 1
    mode: slider
    icon: mdi:cpu-64-bit
    initial: 55
  mqtt_broker_memory_alert_threshold:
    name: MQTT Memory Alert Threshold %
    min: 0
    max: 100
    step: 1
    mode: slider
    icon: mdi:memory
    initial: 30
  mqtt_broker_cpu_critical_threshold:
    name: MQTT CPU Critical Threshold %
    min: 0
    max: 100
    step: 1
    mode: slider
    icon: mdi:alert
    initial: 70
  mqtt_broker_memory_critical_threshold:
    name: MQTT Memory Critical Threshold %
    min: 0
    max: 100
    step: 1
    mode: slider
    icon: mdi:alert-octagon
    initial: 45

# ==============================================================================
# Added with GitHib Copilot GPT 5 on 9 Nov 2025
# ==============================================================================
  ipbans_previous_count:
    name: IP Bans Previous Count
    min: 0
    max: 100000
    step: 1
    mode: box
    icon: mdi:shield-alert

# ==============================================================================
# Shell Commands
# ==============================================================================
shell_command:
  git_commit: '/config/scripts/git_commit.sh'
  git_commit_bash: '/bin/bash /config/scripts/git_commit_1.sh'
  save_commit_message: 'bash -c "printf %s \"{{ message }}\" > /config/.last_commit_message"'
  backup_config: >
    cp -r /config /backup/ha-config-$(date +%Y%m%d_%H%M%S)
  check_system_status: >
    echo "System check at $(date)" > /config/system_check.log
  extract_sensors: >
    python3 /config/scripts/extract_sensors.py
  restart_deye_integration: >
    curl -X POST -H "Authorization: Bearer !secret ha_long_lived_token" \
    -H "Content-Type: application/json" \
    http://192.168.1.30:8123/api/config/config_entries/reload
  restart_homeassistant: >
    curl -X POST -H "Authorization: Bearer !secret ha_long_lived_token" \
    -H "Content-Type: application/json" \
    http://192.168.1.30:8123/api/services/homeassistant/restart
  cleanup_logs: >
    find /config -name "home-assistant.log*" -mtime +7 -delete &&
    find /config -name "*.log" -size +10M -delete
  check_log_size: >
    du -sh /config/home-assistant.log 2>/dev/null | cut -f1 > /config/log_size.txt || echo "0" > /config/log_size.txt
  cleanup_sensor_reports: >
    find /config/sensor_reports -type f -name "sensors_*" -mtime +14 -delete &&
    echo "Sensor reports older than 14 days deleted"
# Monthly DB maintenance helpers (first Monday 06:30) 
  db_monthly_backup: >
    cp /config/home-assistant_v2.db /backup/home-assistant_v2-$(date +%Y%m%d)_monthly.sqlite && echo "/backup/home-assistant_v2-$(date +%Y%m%d)_monthly.sqlite" > /backup/db-monthly-latest.txt
  db_monthly_checksum: >
    md5sum /backup/home-assistant_v2-$(date +%Y%m%d)_monthly.sqlite | awk '{print $1}' > /backup/home-assistant_v2-$(date +%Y%m%d)_monthly.md5

