# Placeholder to keep package loader happy. (Previously empty)
{}notify_all_channels:
  alias: "Notify: All Channels (HA + Telegram + Email)"
  description: "Sends a notification to Home Assistant persistent notifications, Telegram, and Email."
  mode: queued
  fields:
    title:
      description: "Notification title"
      example: "System Alert"
    message:
      description: "Notification message body"
      example: "Something happened."
    telegram_targets:
      description: "Optional Telegram chat IDs. If not provided, uses your default."
      example:
        - 6167623299
  sequence:
    - variables:
        _title: "{{ title | default('Home Assistant Notification') }}"
        _message: "{{ message | default('') }}"
        _tg_targets: "{{ telegram_targets | default([6167623299]) }}"

    # 1) Home Assistant UI (always)
    - service: persistent_notification.create
      data:
        title: "{{ _title }}"
        message: "{{ _message }}"

    # 2) Telegram (always)
    - service: telegram_bot.send_message
      data:
        target: "{{ _tg_targets }}"
        message: >-
          *{{ _title }}*

          {{ _message }}
        parse_mode: markdown

    # 3) Email (always)
    - service: notify.email_notify_jbarkhuizen_gmail_com
      data:
        title: "{{ _title }}"
        message: "{{ _message }}"