# Package: Daily maintenance and housekeeping tasks
# All tasks triggered between 06:00 and 09:00.
# NOTE: Existing code is preserved; automations are guarded by Maintenance Mode.

automation:
  - id: daily_maintenance_0900
    alias: Daily Maintenance — Cleanup and Backup (09:00)
    description: Run housekeeping tasks once daily at 09:00.
    trigger:
      - platform: time
        at: "09:00:00"
    # Maintenance Mode must be OFF
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - service: shell_command.cleanup_logs
      - service: shell_command.check_log_size
      - service: shell_command.cleanup_sensor_reports
      - service: shell_command.extract_sensors
      - service: shell_command.backup_config
    mode: single

  - id: weekly_restart_0900_monday
    alias: Weekly Home Assistant Restart — Monday (09:00)
    description: Restart Home Assistant weekly on Monday at 09:00.
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      # Maintenance Mode must be OFF
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: time
        weekday:
          - mon
    action:
      - service: homeassistant.restart
    mode: single

  # Database baseline initializer (Startup) — not guarded
  - id: recorder_initialize_baseline
    alias: "Database - Initialize Baseline (Startup)"
    description: "Set initial DB size baseline and default threshold after restart if not set."
    mode: single
    trigger:
      - platform: homeassistant
        event: start
    action:
      - variables:
          current: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
          baseline: "{{ states('input_number.homeassistant_db_baseline_mb') | float(0) }}"
          threshold: "{{ states('input_number.homeassistant_db_growth_threshold_percent') | float(0) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ baseline == 0 and current > 0 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.homeassistant_db_baseline_mb
                data:
                  value: "{{ current }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ threshold == 0 or threshold < 5 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.homeassistant_db_growth_threshold_percent
                data:
                  value: 20

  # Daily 09h00 DB growth check — guarded (purge/repack can be disruptive)
  - id: recorder_daily_growth_check
    alias: "Database - Daily 09h00 Growth Check"
    description: "Evaluate DB growth; purge & repack if abnormal; then refresh baseline."
    mode: single
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - variables:
          current: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
          baseline: "{{ states('input_number.homeassistant_db_baseline_mb') | float(0) }}"
          threshold_percent: "{{ states('input_number.homeassistant_db_growth_threshold_percent') | float(20) }}"
          diff_mb: "{{ (current - baseline) | round(2) }}"
          pct_growth: >
            {% if baseline > 0 %}
              {{ ((current - baseline) / baseline * 100) | round(2) }}
            {% else %}
              0
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ pct_growth > threshold_percent and diff_mb > 250 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Database Growth Alert"
                  message: >
                    Home Assistant DB size increased abnormally.
                    Previous baseline (09h00 yesterday): {{ baseline }} MB
                    Current size: {{ current }} MB
                    Increase: {{ diff_mb }} MB ({{ pct_growth }}%)
                    Threshold: {{ threshold_percent }}%
                    Action: Initiating purge & repack (keep 360 days).
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: recorder.purge
                data:
                  keep_days: 360
                  repack: true
          - conditions:
              - condition: template
                value_template: "{{ pct_growth <= threshold_percent or diff_mb <= 250 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Database Daily Check"
                  message: >
                    Database size within normal range.
                    Baseline: {{ baseline }} MB
                    Current: {{ current }} MB
                    Change: {{ diff_mb }} MB ({{ pct_growth }}%)
                    Threshold: {{ threshold_percent }}%
                    Retention: 360 days
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
      - service: input_number.set_value
        target:
          entity_id: input_number.homeassistant_db_baseline_mb
        data:
          value: "{{ current }}"

  # Monthly DB backup & compaction — First Monday 06:30 — guarded
  - id: recorder_monthly_backup_compaction
    alias: "Database - Monthly Backup & Compaction (First Monday 06:30)"
    description: "Create monthly DB backup with checksum, then compact (repack)."
    mode: single
    trigger:
      - platform: time
        at: "06:30:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: time
        weekday:
          - mon
      - condition: template
        value_template: "{{ now().day <= 7 }}" # First Monday window (day 1–7)
    action:
      - variables:
          pre_size: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
      - service: shell_command.db_monthly_backup
      - service: shell_command.db_monthly_checksum
      - delay: "00:00:05"
      - service: recorder.purge
        data:
          keep_days: 360
          repack: true
      - delay: "00:00:05"
      - variables:
          post_size: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
      - service: persistent_notification.create
        data:
          title: "Monthly DB Backup & Compaction Complete"
          message: >
            Monthly database maintenance finished.
            Size before: {{ pre_size }} MB
            Size after: {{ post_size }} MB
            Backup path recorded in /backup/db-monthly-latest.txt
            Retention: 360 days
            Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

  # Daily InfluxDB data flow verification — 08:00 (read-only, not guarded)
  - id: influxdb_flow_verification_0800
    alias: "InfluxDB Data Flow Verification 08h00"
    description: "Verify critical inverter sensors updated recently (proxy for data feed & write)."
    mode: single
    trigger:
      - platform: time
        at: "08:00:00"
    action:
      - variables:
          sensors: >
            {{ [
              'sensor.deyeinvertermaster_pv_power',
              'sensor.deyeinverterslave_pv_power',
              'sensor.deyeinvertermaster_inverter_output_power',
              'sensor.deyeinverterslave_inverter_output_power',
              'sensor.deyeinvertermaster_battery_soc',
              'sensor.deyeinverterslave_battery_soc'
            ] }}
          stale_list: >
            {% set cutoff = (now() - timedelta(minutes=15)) %}
            {% set bad = [] %}
            {% for s in sensors %}
              {% set st = states[s] %}
              {% if st is not none %}
                {% if st.last_changed < cutoff or st.state in ['unknown','unavailable',''] %}
                  {% set _ = bad.append(s) %}
                {% endif %}
              {% else %}
                {% set _ = bad.append(s) %}
              {% endif %}
            {% endfor %}
            {{ bad }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ stale_list | length > 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "InfluxDB Data Flow Warning"
                  message: >
                    One or more critical inverter sensors have stale or invalid states
                    in the last 15 minutes (08h00 check).
                    Stale sensors: {{ stale_list }}
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: homeassistant.update_entity
                target:
                  entity_id: sensor.influxdb_flow_status
          - conditions:
              - condition: template
                value_template: "{{ stale_list | length == 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "InfluxDB Data Flow OK"
                  message: >
                    All critical inverter sensors updated within the last 15 minutes.
                    Data flow healthy as of 08h00.
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: homeassistant.update_entity
                target:
                  entity_id: sensor.influxdb_flow_status
      - delay: "00:00:02"

  # Security: IP ban delta & summary — 06:15 (read-only, not guarded)
  - id: security_ip_bans_summary_0615
    alias: "Security - IP Ban Daily Summary (06:15)"
    description: "Report new IP bans vs baseline; send Telegram if increased."
    mode: single
    trigger:
      - platform: time
        at: "06:15:00"
    action:
      - variables:
          current: "{{ states('sensor.home_assistant_ip_bans_count') | int(0) }}"
          baseline: "{{ states('input_number.ipbans_previous_count') | int(0) }}"
          diff: "{{ (current - baseline) | int }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ diff > 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Security: New IP bans detected"
                  message: >
                    IP bans increased since yesterday.
                    Previous: {{ baseline }} | Current: {{ current }} | Increase: {{ diff }}
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
      - service: input_number.set_value
        target:
          entity_id: input_number.ipbans_previous_count
        data:
          value: "{{ current }}"

  # Node-RED & Grafana + critical add-ons health — 08:15 — guarded
  - id: addons_health_check_0815
    alias: "Add-ons Health Check & Restart if needed (08:15)"
    description: "Checks critical add-ons; restarts on failure; summarizes results via Telegram and persistent notification."
    mode: single
    trigger:
      - platform: time
        at: "08:15:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      # Pre-check statuses and whether restarts are needed
      - variables:
          node_http: "{{ states('sensor.node_red_http_status_code') | int(0) }}"
          graf_http: "{{ states('sensor.grafana_http_status_code') | int(0) }}"
          node_running: "{{ is_state('binary_sensor.node_red_running', 'on') }}"
          graf_running: "{{ is_state('binary_sensor.grafana_running', 'on') }}"
          mosq_running: "{{ is_state('binary_sensor.mosquitto_broker_running', 'on') }}"
          infl_running: "{{ is_state('binary_sensor.influxdb_running', 'on') }}"
          adga_running: "{{ is_state('binary_sensor.adguard_home_running', 'on') }}"
          code_running: "{{ is_state('binary_sensor.studio_code_server_running', 'on') }}"
          samb_running: "{{ is_state('binary_sensor.samba_share_running', 'on') }}"
          matt_running: "{{ is_state('binary_sensor.matter_server_running', 'on') }}"

          need_restart_node: "{{ (node_http != 200) or (not node_running) }}"
          need_restart_graf: "{{ (graf_http != 200) or (not graf_running) }}"
          need_restart_mosq: "{{ not mosq_running }}"
          need_restart_infl: "{{ not infl_running }}"
          need_restart_adga: "{{ not adga_running }}"
          need_restart_code: "{{ not code_running }}"
          need_restart_samb: "{{ not samb_running }}"
          need_restart_matt: "{{ not matt_running }}"

      # Restart block per add-on (using official slugs where applicable)
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_node | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: Node-RED"
                  message: "Unhealthy (HTTP {{ node_http }}) or not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "a0d7b954_nodered"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_graf | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: Grafana"
                  message: "Unhealthy (HTTP {{ graf_http }}) or not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "a0d7b954_grafana"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_mosq | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: Mosquitto broker"
                  message: "Not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "core_mosquitto"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_infl | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: InfluxDB"
                  message: "Not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "a0d7b954_influxdb"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_adga | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: AdGuard Home"
                  message: "Not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "a0d7b954_adguard"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_code | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: Studio Code Server"
                  message: "Not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "a0d7b954_vscode"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_samb | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: Samba share"
                  message: "Not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "core_samba"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ need_restart_matt | bool }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-on Health: Matter Server"
                  message: "Not running. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "core_matter_server"

      # Allow services time to come back up
      - delay:
          seconds: 25

      # Post-check results
      - variables:
          node_http_after: "{{ states('sensor.node_red_http_status_code') | int(0) }}"
          graf_http_after: "{{ states('sensor.grafana_http_status_code') | int(0) }}"
          node_running_after: "{{ is_state('binary_sensor.node_red_running', 'on') }}"
          graf_running_after: "{{ is_state('binary_sensor.grafana_running', 'on') }}"
          mosq_running_after: "{{ is_state('binary_sensor.mosquitto_broker_running', 'on') }}"
          infl_running_after: "{{ is_state('binary_sensor.influxdb_running', 'on') }}"
          adga_running_after: "{{ is_state('binary_sensor.adguard_home_running', 'on') }}"
          code_running_after: "{{ is_state('binary_sensor.studio_code_server_running', 'on') }}"
          samb_running_after: "{{ is_state('binary_sensor.samba_share_running', 'on') }}"
          matt_running_after: "{{ is_state('binary_sensor.matter_server_running', 'on') }}"

          still_down_list: >
            {% set bad = [] %}
            {% if not node_running_after %}{% set _ = bad.append('Node-RED') %}{% endif %}
            {% if not graf_running_after %}{% set _ = bad.append('Grafana') %}{% endif %}
            {% if not mosq_running_after %}{% set _ = bad.append('Mosquitto') %}{% endif %}
            {% if not infl_running_after %}{% set _ = bad.append('InfluxDB') %}{% endif %}
            {% if not adga_running_after %}{% set _ = bad.append('AdGuard Home') %}{% endif %}
            {% if not code_running_after %}{% set _ = bad.append('Studio Code Server') %}{% endif %}
            {% if not samb_running_after %}{% set _ = bad.append('Samba share') %}{% endif %}
            {% if not matt_running_after %}{% set _ = bad.append('Matter Server') %}{% endif %}
            {{ bad }}

          any_attempted_restart: >
            {{ (need_restart_node or need_restart_graf or need_restart_mosq or need_restart_infl
                or need_restart_adga or need_restart_code or need_restart_samb or need_restart_matt) | bool }}

      - choose:
          # If something remains down, send alert
          - conditions:
              - condition: template
                value_template: "{{ still_down_list | length > 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-ons Health: Attention Required"
                  message: >
                    One or more add-ons remain unhealthy or stopped after attempted restart.
                    Still down: {{ still_down_list }}
                    Node-RED HTTP: {{ node_http_after }} | Grafana HTTP: {{ graf_http_after }}
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              # Telegram — replace 6167623299with your real chat_id
              - service: telegram_bot.send_message
                data:
                  target:
                    - 6167623299
                  message: >-
                    ❗ *Add-ons Health: Attention Required*
                    • Still down: {{ still_down_list | join(', ') }}
                    • Node-RED HTTP: {{ node_http_after }} | Grafana HTTP: {{ graf_http_after }}
                    _{{ now().strftime('%Y-%m-%d %H:%M:%S') }}_
                  parse_mode: markdown

          # Else if restarts were attempted and now OK, send success summary
          - conditions:
              - condition: template
                value_template: "{{ still_down_list | length == 0 and any_attempted_restart }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Add-ons Health: Recoveries Applied"
                  message: >
                    Add-on recoveries applied successfully.
                    Node-RED HTTP: {{ node_http_after }} | Grafana HTTP: {{ graf_http_after }}
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: telegram_bot.send_message
                data:
                  target:
                    - 6167623299
                  message: >-
                    ✅ *Add-ons Health: Recoveries Applied*
                    • All critical add-ons now healthy
                    • Node-RED HTTP: {{ node_http_after }}, Grafana HTTP: {{ graf_http_after }}
                    _{{ now().strftime('%Y-%m-%d %H:%M:%S') }}_
                  parse_mode: markdown

          # Else, everything healthy and no restarts needed — just log
          - conditions:
              - condition: template
                value_template: "{{ still_down_list | length == 0 and not any_attempted_restart }}"
            sequence:
              - service: system_log.write
                data:
                  message: >-
                    Add-ons Health 08:15 — All healthy, no restart required.
                    Node-RED HTTP: {{ node_http_after }} | Grafana HTTP: {{ graf_http_after }}
                  level: info

  # Sunsunk/Deye stale data detection — 06:35 and 08:35 — guarded (reloads integration)
  - id: deye_stale_data_recovery
    alias: "Sunsunk Inverters - Stale Data Recovery (06:35 & 08:35)"
    description: "If key inverter sensors are stale >10 min, reload Deye integration."
    mode: single
    trigger:
      - platform: time
        at: "06:35:00"
      - platform: time
        at: "08:35:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - variables:
          keys: >
            {{ [
              'sensor.deyeinvertermaster_pv_power',
              'sensor.deyeinverterslave_pv_power',
              'sensor.deyeinvertermaster_inverter_output_power',
              'sensor.deyeinverterslave_inverter_output_power',
              'sensor.deyeinvertermaster_battery_soc',
              'sensor.deyeinverterslave_battery_soc'
            ] }}
          stale: >
            {% set cutoff = (now() - timedelta(minutes=10)) %}
            {% set bad = [] %}
            {% for s in keys %}
              {% set st = states[s] %}
              {% if st is none or st.state in ['unknown','unavailable',''] or st.last_changed < cutoff %}
                {% set _ = bad.append(s) %}
              {% endif %}
            {% endfor %}
            {{ bad }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ stale | length > 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Sunsunk Inverter Data Stale"
                  message: >
                    Stale sensors detected (>10 min): {{ stale }}.
                    Reloading Deye integration.
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: shell_command.restart_deye_integration

# Template sensor summarizing last Influx verification (unchanged)
template:
  - sensor:
      - name: "influxdb_flow_status"
        unique_id: influxdb_flow_status
        state: >
          {% set pn = states.persistent_notification %}
          {% set warn = 'InfluxDB Data Flow Warning' %}
          {% set ok = 'InfluxDB Data Flow OK' %}
          {% if warn in (pn | string) %}
            warning
          {% elif ok in (pn | string) %}
            ok
          {% else %}
            pending
          {% endif %}
        icon: >
          {% if this.state == 'ok' %}mdi:database-check
          {% elif this.state == 'warning' %}mdi:database-alert
          {% else %}mdi:database-clock{% endif %}

# Replacement for the old file sensor
command_line:
  - sensor:
      name: Home Assistant Log Size
      command: "cat /config/log_size.txt 2>/dev/null || echo 0"
      scan_interval: 300
      unique_id: home_assistant_log_size_sensor
