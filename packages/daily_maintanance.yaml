# Package: Daily maintenance and housekeeping tasks
# All tasks triggered between 06:00 and 09:00.
# NOTE: Existing code is preserved; automations are guarded by Maintenance Mode.

automation:
  - id: daily_maintenance_0900
    alias: Daily Maintenance — Cleanup and Backup (09:00)
    description: Run housekeeping tasks once daily at 09:00.
    trigger:
      - platform: time
        at: "09:00:00"
    # Maintenance Mode must be OFF
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - service: shell_command.cleanup_logs
      - service: shell_command.check_log_size
      - service: shell_command.cleanup_sensor_reports
      - service: shell_command.extract_sensors
      - service: shell_command.backup_config
    mode: single

  - id: weekly_restart_0900_monday
    alias: Weekly Home Assistant Restart — Monday (09:00)
    description: Restart Home Assistant weekly on Monday at 09:00.
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      # Maintenance Mode must be OFF
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: time
        weekday:
          - mon
    action:
      - service: homeassistant.restart
    mode: single

  # Database baseline initializer (Startup) — not guarded
  - id: recorder_initialize_baseline
    alias: "Database - Initialize Baseline (Startup)"
    description: "Set initial DB size baseline and default threshold after restart if not set."
    mode: single
    trigger:
      - platform: homeassistant
        event: start
    action:
      - variables:
          current: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
          baseline: "{{ states('input_number.homeassistant_db_baseline_mb') | float(0) }}"
          threshold: "{{ states('input_number.homeassistant_db_growth_threshold_percent') | float(0) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ baseline == 0 and current > 0 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.homeassistant_db_baseline_mb
                data:
                  value: "{{ current }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ threshold == 0 or threshold < 5 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.homeassistant_db_growth_threshold_percent
                data:
                  value: 20

  # Daily 09h00 DB growth check — guarded (purge/repack can be disruptive)
  - id: recorder_daily_growth_check
    alias: "Database - Daily 09h00 Growth Check"
    description: "Evaluate DB growth; purge & repack if abnormal; then refresh baseline."
    mode: single
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - variables:
          current: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
          baseline: "{{ states('input_number.homeassistant_db_baseline_mb') | float(0) }}"
          threshold_percent: "{{ states('input_number.homeassistant_db_growth_threshold_percent') | float(20) }}"
          diff_mb: "{{ (current - baseline) | round(2) }}"
          pct_growth: >
            {% if baseline > 0 %}
              {{ ((current - baseline) / baseline * 100) | round(2) }}
            {% else %}
              0
            {% endif %}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ pct_growth > threshold_percent and diff_mb > 250 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Database Growth Alert"
                  message: >
                    Home Assistant DB size increased abnormally.
                    Previous baseline (09h00 yesterday): {{ baseline }} MB
                    Current size: {{ current }} MB
                    Increase: {{ diff_mb }} MB ({{ pct_growth }}%)
                    Threshold: {{ threshold_percent }}%
                    Action: Initiating purge & repack (keep 360 days).
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: recorder.purge
                data:
                  keep_days: 360
                  repack: true
          - conditions:
              - condition: template
                value_template: "{{ pct_growth <= threshold_percent or diff_mb <= 250 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Database Daily Check"
                  message: >
                    Database size within normal range.
                    Baseline: {{ baseline }} MB
                    Current: {{ current }} MB
                    Change: {{ diff_mb }} MB ({{ pct_growth }}%)
                    Threshold: {{ threshold_percent }}%
                    Retention: 360 days
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
      - service: input_number.set_value
        target:
          entity_id: input_number.homeassistant_db_baseline_mb
        data:
          value: "{{ current }}"

  # Monthly DB backup & compaction — First Monday 06:30 — guarded
  - id: recorder_monthly_backup_compaction
    alias: "Database - Monthly Backup & Compaction (First Monday 06:30)"
    description: "Create monthly DB backup with checksum, then compact (repack)."
    mode: single
    trigger:
      - platform: time
        at: "06:30:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
      - condition: time
        weekday:
          - mon
      - condition: template
        value_template: "{{ now().day <= 7 }}" # First Monday window (day 1–7)
    action:
      - variables:
          pre_size: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
      - service: shell_command.db_monthly_backup
      - service: shell_command.db_monthly_checksum
      - delay: "00:00:05"
      - service: recorder.purge
        data:
          keep_days: 360
          repack: true
      - delay: "00:00:05"
      - variables:
          post_size: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
      - service: persistent_notification.create
        data:
          title: "Monthly DB Backup & Compaction Complete"
          message: >
            Monthly database maintenance finished.
            Size before: {{ pre_size }} MB
            Size after: {{ post_size }} MB
            Backup path recorded in /backup/db-monthly-latest.txt
            Retention: 360 days
            Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

  # Daily InfluxDB data flow verification — 08:00 (read-only, not guarded)
  - id: influxdb_flow_verification_0800
    alias: "InfluxDB Data Flow Verification 08h00"
    description: "Verify critical inverter sensors updated recently (proxy for data feed & write)."
    mode: single
    trigger:
      - platform: time
        at: "08:00:00"
    action:
      - variables:
          sensors: >
            {{ [
              'sensor.deyeinvertermaster_pv_power',
              'sensor.deyeinverterslave_pv_power',
              'sensor.deyeinvertermaster_inverter_output_power',
              'sensor.deyeinverterslave_inverter_output_power',
              'sensor.deyeinvertermaster_battery_soc',
              'sensor.deyeinverterslave_battery_soc'
            ] }}
          stale_list: >
            {% set cutoff = (now() - timedelta(minutes=15)) %}
            {% set bad = [] %}
            {% for s in sensors %}
              {% set st = states[s] %}
              {% if st is not none %}
                {% if st.last_changed < cutoff or st.state in ['unknown','unavailable',''] %}
                  {% set _ = bad.append(s) %}
                {% endif %}
              {% else %}
                {% set _ = bad.append(s) %}
              {% endif %}
            {% endfor %}
            {{ bad }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ stale_list | length > 0 }}"
            sequence:
              # Persistant Notification Service
              - service: persistent_notification.create
                data:
                  title: "InfluxDB Data Flow Warning"
                  message: >
                    One or more critical inverter sensors have stale or invalid states
                    in the last 15 minutes (08h00 check).
                    Stale sensors: {{ stale_list }}
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: homeassistant.update_entity
                target:
                  entity_id: sensor.influxdb_flow_status
          - conditions:
              - condition: template
                value_template: "{{ stale_list | length == 0 }}"
            sequence:
              # Persistant Notification Service
              - service: persistent_notification.create
                data:
                  title: "InfluxDB Data Flow OK"
                  message: >
                    All critical inverter sensors updated within the last 15 minutes.
                    Data flow healthy as of 08h00.
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: homeassistant.update_entity
                target:
                  entity_id: sensor.influxdb_flow_status
      - delay: "00:00:02"

  # Security: IP ban delta & summary — 06:15 (read-only, not guarded)
  - id: security_ip_bans_summary_0615
    alias: "Security - IP Ban Daily Summary (06:15)"
    description: "Report new IP bans vs baseline; send Telegram if increased."
    mode: single
    trigger:
      - platform: time
        at: "06:15:00"
    action:
      - variables:
          current: "{{ states('sensor.home_assistant_ip_bans_count') | int(0) }}"
          baseline: "{{ states('input_number.ipbans_previous_count') | int(0) }}"
          diff: "{{ (current - baseline) | int }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ diff > 0 }}"
            sequence:
              # Persistant Notification Service
              - service: persistent_notification.create
                data:
                  title: "Security: New IP bans detected"
                  message: >
                    IP bans increased since yesterday.
                    Previous: {{ baseline }} | Current: {{ current }} | Increase: {{ diff }}
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
      - service: input_number.set_value
        target:
          entity_id: input_number.ipbans_previous_count
        data:
          value: "{{ current }}"

  # Node-RED & Grafana health — 08:15 — guarded (can restart add-ons)
  - id: addons_health_check_0815
    alias: "Add-ons Health Check & Restart if needed (08:15)"
    description: "Checks Node-RED and Grafana HTTP health; restarts add-on on failure."
    mode: single
    trigger:
      - platform: time
        at: "08:15:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - variables:
          node_status: "{{ states('sensor.node_red_http_status_code') | int(0) }}"
          graf_status: "{{ states('sensor.grafana_http_status_code') | int(0) }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ node_status != 200 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Node-RED Health Alert"
                  message: "HTTP status: {{ node_status }}. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "a0d7b954_nodered"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ graf_status != 200 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Grafana Health Alert"
                  message: "HTTP status: {{ graf_status }}. Attempting restart..."
              - service: hassio.addon_restart
                data:
                  addon: "a0d7b954_grafana"

  # Sunsunk/Deye stale data detection — 06:35 and 08:35 — guarded (reloads integration)
  - id: deye_stale_data_recovery
    alias: "Sunsunk Inverters - Stale Data Recovery (06:35 & 08:35)"
    description: "If key inverter sensors are stale >10 min, reload Deye integration."
    mode: single
    trigger:
      - platform: time
        at: "06:35:00"
      - platform: time
        at: "08:35:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - variables:
          keys: >
            {{ [
              'sensor.deyeinvertermaster_pv_power',
              'sensor.deyeinverterslave_pv_power',
              'sensor.deyeinvertermaster_inverter_output_power',
              'sensor.deyeinverterslave_inverter_output_power',
              'sensor.deyeinvertermaster_battery_soc',
              'sensor.deyeinverterslave_battery_soc'
            ] }}
          stale: >
            {% set cutoff = (now() - timedelta(minutes=10)) %}
            {% set bad = [] %}
            {% for s in keys %}
              {% set st = states[s] %}
              {% if st is none or st.state in ['unknown','unavailable',''] or st.last_changed < cutoff %}
                {% set _ = bad.append(s) %}
              {% endif %}
            {% endfor %}
            {{ bad }}
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ stale | length > 0 }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Sunsunk Inverter Data Stale"
                  message: >
                    Stale sensors detected (>10 min): {{ stale }}.
                    Reloading Deye integration.
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: shell_command.restart_deye_integration

  # ----------------------------------------------------------------------------
  # (NEW) DB & Log Trend Alerts — 08:45
  # ----------------------------------------------------------------------------
  - id: db_log_trend_alert_0845
    alias: "System: DB & Log Trend Alerts (08:45)"
    description: >
      Alerts on abnormal DB growth trends (3-day) and persistent log errors.
      Notification-only (no purge), guarded by Maintenance Mode.
    mode: single
    trigger:
      - platform: time
        at: "08:45:00"
    condition:
      - condition: state
        entity_id: input_boolean.maintenance_mode
        state: "off"
    action:
      - variables:
          # DB
          db_current: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
          db_baseline: "{{ states('input_number.homeassistant_db_baseline_mb') | float(0) }}"
          db_change_3d: "{{ states('sensor.db_size_change_3d') | float(0) }}"
          db_change_7d: "{{ states('sensor.db_size_change_7d') | float(0) }}"
          db_pct_vs_baseline: >
            {% if db_baseline > 0 %}
              {{ (((db_current - db_baseline) / db_baseline) * 100) | round(1) }}
            {% else %}0{% endif %}
          # LOGS
          log_mb: "{{ states('sensor.home_assistant_log_size_mb') | float(0) }}"
          log_on_hours_48h: "{{ states('sensor.log_errors_on_hours_48h') | float(0) }}"
          # Thresholds
          db_3d_mb_threshold: 500
          db_pct_threshold: 25
          log_mb_threshold: 1.0
          log_hours_threshold: 24
          # Flags
          db_alert: "{{ db_change_3d > db_3d_mb_threshold and db_pct_vs_baseline > db_pct_threshold }}"
          log_alert: "{{ log_mb > log_mb_threshold or log_on_hours_48h >= log_hours_threshold }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ db_alert }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Database Trend Alert (3-day)"
                  message: >
                    DB growth over 3 days appears high.
                    Current: {{ db_current }} MB
                    Baseline: {{ db_baseline }} MB
                    3-day Change: {{ db_change_3d }} MB
                    7-day Change: {{ db_change_7d }} MB
                    Percent vs Baseline: {{ db_pct_vs_baseline }}%
                    Thresholds: {{ db_3d_mb_threshold }} MB, {{ db_pct_threshold }}%
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: telegram_bot.send_message
                data:
                  target:
                    - 6167623299
                  message: >-
                    ⚠️ *Database Trend Alert (3-day)*  
                    Now: {{ db_current }} MB | Baseline: {{ db_baseline }} MB  
                    3d Δ: {{ db_change_3d }} MB | 7d Δ: {{ db_change_7d }} MB  
                    % vs baseline: {{ db_pct_vs_baseline }}%  
                    _{{ now().strftime('%Y-%m-%d %H:%M:%S') }}_
                  parse_mode: markdown
          - conditions:
              - condition: template
                value_template: "{{ log_alert }}"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Log Health Alert"
                  message: >
                    Logs indicate persistent errors or large size.
                    Current Log Size: {{ log_mb }} MB
                    Hours with errors in last 48h: {{ log_on_hours_48h }} h
                    Thresholds: {{ log_mb_threshold }} MB or {{ log_hours_threshold }} h
                    Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
              - service: telegram_bot.send_message
                data:
                  target:
                    - 6167623299
                  message: >-
                    ⚠️ *Log Health Alert*  
                    Size: {{ log_mb }} MB | 48h error hours: {{ log_on_hours_48h }}h  
                    _{{ now().strftime('%Y-%m-%d %H:%M:%S') }}_
                  parse_mode: markdown
      - service: system_log.write
        data:
          message: >-
            DB/Log Trend check: db_change_3d={{ db_change_3d }}MB, pct_vs_baseline={{ db_pct_vs_baseline }}%, log_mb={{ log_mb }}MB, log_hours48={{ log_on_hours_48h }}h
          level: info

# Template sensor summarizing last Influx verification (unchanged) + new template sensors
template:
  - sensor:
      - name: "influxdb_flow_status"
        unique_id: influxdb_flow_status
        state: >
          {% set pn = states.persistent_notification %}
          {% set warn = 'InfluxDB Data Flow Warning' %}
          {% set ok = 'InfluxDB Data Flow OK' %}
          {% if warn in (pn | string) %}
            warning
          {% elif ok in (pn | string) %}
            ok
          {% else %}
            pending
          {% endif %}
        icon: >
          {% if this.state == 'ok' %}mdi:database-check
          {% elif this.state == 'warning' %}mdi:database-alert
          {% else %}mdi:database-clock{% endif %}
      # NEW: Convert log size to numeric MB for trend checks
      - name: "Home Assistant Log Size (MB)"
        unique_id: ha_log_size_mb
        unit_of_measurement: MB
        state: >
          {% set raw = states('sensor.home_assistant_log_size') | string %}
          {% if raw.endswith('M') %}
            {{ raw[:-1] | float(0) }}
          {% elif raw.endswith('K') %}
            {{ (raw[:-1] | float(0)) / 1024 }}
          {% elif raw.endswith('G') %}
            {{ (raw[:-1] | float(0)) * 1024 }}
          {% elif raw in ['unknown','unavailable','', None] %}
            0
          {% else %}
            {{ raw | float(0) }}
          {% endif %}
  - binary_sensor:
      - name: "Home Assistant Log Has Errors"
        unique_id: ha_log_has_errors
        device_class: problem
        state: "{{ states('sensor.home_assistant_log_size_mb') | float(0) > 0.25 }}"
        icon: >
          {% if is_state(this.entity_id, 'on') %}mdi:alert-circle{% else %}mdi:check-circle{% endif %}

# Replacement for the old file sensor
command_line:
  - sensor:
      name: Home Assistant Log Size
      command: "cat /config/log_size.txt 2>/dev/null || echo 0"
      scan_interval: 300
      unique_id: home_assistant_log_size_sensor

# NEW: Statistics and History sensors for trend analysis
sensor:
  # DB size change over rolling 3 days and 7 days
  - platform: statistics
    name: db_size_change_3d
    unique_id: db_size_change_3d
    entity_id: sensor.homeassistant_db_size_mb
    state_characteristic: change
    max_age:
      days: 3
    sampling_size: 5000

  - platform: statistics
    name: db_size_change_7d
    unique_id: db_size_change_7d
    entity_id: sensor.homeassistant_db_size_mb
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 10000

  # Hours with 'log has errors' over last 48 hours
  - platform: history_stats
    name: log_errors_on_hours_48h
    entity_id: binary_sensor.home_assistant_log_has_errors
    state: "on"
    type: time
    duration:
      hours: 48
    end: "{{ now() }}"
