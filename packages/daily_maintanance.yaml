# Package: Daily maintenance and housekeeping tasks
# All tasks triggered at 09:00, per your requirement.
# NOTE: The former 'file sensor' approach is now deprecated for YAML.
# We keep the original block commented out for reference and provide a command_line sensor replacement.

automation:
  - id: daily_maintenance_0900
    alias: Daily Maintenance — Cleanup and Backup (09:00)
    description: Run housekeeping tasks once daily at 09:00.
    trigger:
      - platform: time
        at: "09:00:00"
    action:
      - service: shell_command.cleanup_logs
      - service: shell_command.check_log_size
      - service: shell_command.cleanup_sensor_reports
      - service: shell_command.extract_sensors
      - service: shell_command.backup_config
    mode: single

  - id: weekly_restart_0900_monday
    alias: Weekly Home Assistant Restart — Monday (09:00)
    description: Restart Home Assistant weekly on Monday at 09:00.
    trigger:
      - platform: time
        at: "09:00:00"
    condition:
      - condition: time
        weekday:
          - mon
    action:
      - service: homeassistant.restart
    mode: single

# ----------------------------------------------------------------------------------
# ORIGINAL (NOW INVALID) FILE SENSOR BLOCK — COMMENTED OUT, DO NOT DELETE
# Kept for historical context per your instruction not to remove existing code.
#
# sensor:
#   - platform: file
#     name: Home Assistant Log Size
#     file_path: /config/log_size.txt
#     value_template: "{{ value | trim }}"
#     scan_interval: 300
#
# Reason for deprecation error:
# Home Assistant reports "Unused YAML configuration" because 'platform: file'
# is no longer a valid method for configuring a file-based sensor.
# ----------------------------------------------------------------------------------

# ----------------------------------------------------------------------------------
# REPLACEMENT: Use command_line sensor to read the log_size.txt contents
# This is fully supported and will populate a sensor with the same value.
# The shell_command.check_log_size (run at 09:00) writes /config/log_size.txt.
# scan_interval ensures periodic refresh if you manually run the shell command or
# if other processes update the file.
# ----------------------------------------------------------------------------------
command_line:
  - sensor:
      name: Home Assistant Log Size
      command: "cat /config/log_size.txt 2>/dev/null || echo 0"
      # Keep output as-is; you can still template it later if you want to normalize units.
      scan_interval: 300
      unique_id: home_assistant_log_size_sensor
      # No value_template required since file already stores a plain string like '2.3M'

