# =============================================================================
# PACKAGE: Battery Weekly Summary Metrics
# - 7d/14d change sensors for Low and Critical device counts
# - 7d alert hours (battery alert active)
# =============================================================================

sensor:
  # 7-day and 14-day "change" for Low count
  - platform: statistics
    name: battery_low_count_change_7d
    unique_id: battery_low_count_change_7d
    entity_id: sensor.battery_devices_low_count
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 10000

  - platform: statistics
    name: battery_low_count_change_14d
    unique_id: battery_low_count_change_14d
    entity_id: sensor.battery_devices_low_count
    state_characteristic: change
    max_age:
      days: 14
    sampling_size: 20000

  # 7-day and 14-day "change" for Critical count
  - platform: statistics
    name: battery_critical_count_change_7d
    unique_id: battery_critical_count_change_7d
    entity_id: sensor.battery_devices_critical_count
    state_characteristic: change
    max_age:
      days: 7
    sampling_size: 10000

  - platform: statistics
    name: battery_critical_count_change_14d
    unique_id: battery_critical_count_change_14d
    entity_id: sensor.battery_devices_critical_count
    state_characteristic: change
    max_age:
      days: 14
    sampling_size: 20000

  # Hours with battery alert active during the last 7 days
  - platform: history_stats
    name: battery_alert_on_hours_7d
    unique_id: battery_alert_on_hours_7d
    entity_id: binary_sensor.battery_alert_active
    state: "on"
    type: time
    duration:
      days: 7
    end: "{{ now() }}"