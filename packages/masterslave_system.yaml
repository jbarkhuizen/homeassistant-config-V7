# SmartHome Integrations
# https://github.com/tomatensaus/DeyeSolarDesktop/blob/main/template_MasterSlave_System.yaml
template:
  - sensor:
      # ---------- Master inverter sensors ----------
      - name: "deyeinvertermaster_solar_power_used"
        unique_id: deyeinvertermaster_solar_power_used
        state: >-
          {{ (states('sensor.deyeinvertermaster_summary_day_pv') | float(0)
             - states('sensor.deyeinvertermaster_summary_day_battery_charge') | float(0)) | round(1) }}
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: >-
          {{ has_value('sensor.deyeinvertermaster_summary_day_pv') and has_value('sensor.deyeinvertermaster_summary_day_battery_charge') }}

      - name: "deyeinvertermaster_essential_load"
        unique_id: deyeinvertermaster_essential_load
        state: >-
          {{ (states('sensor.deyeinvertermaster_deyeinvertermaster_output_power') | float(0)
             + (states('sensor.deyeinvertermaster_grid_load') | float(0)
                - states('sensor.deyeinvertermaster_aux_output_power') | float(0))) | round(0) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.deyeinvertermaster_deyeinvertermaster_output_power')
             and has_value('sensor.deyeinvertermaster_grid_load')
             and has_value('sensor.deyeinvertermaster_aux_output_power') }}

      - name: "deyeinvertermaster_non_essential_load"
        unique_id: deyeinvertermaster_non_essential_load
        state: >-
          {{ (states('sensor.deyeinvertermaster_grid_power_ct_clamp') | float(0)
             - states('sensor.deyeinvertermaster_grid_load') | float(0)) | round(0) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.deyeinvertermaster_grid_power_ct_clamp') and has_value('sensor.deyeinvertermaster_grid_load') }}

      - name: "deyeinvertermaster_priority_charge_or_load"
        unique_id: deyeinvertermaster_priority_charge_or_load
        state: >-
          {% if is_state('select.deyeinvertermaster_energy_management_model', 'Battery Priority Mode') %}
            off
          {% else %}
            on
          {% endif %}
        availability: >-
          {{ states('select.deyeinvertermaster_energy_management_model') not in ['', 'unknown', 'unavailable'] }}

      - name: "deyeinvertermaster_battery_charge_grid_power"
        unique_id: deyeinvertermaster_battery_charge_grid_power
        state: >-
          {% if states('sensor.deyeinvertermaster_inverter_output_power') | float(0) < 0.0 %}
            {{ (states('sensor.deyeinvertermaster_battery_output_power') | float(0) | abs) * 0.001 }}
          {% else %}
            0.0
          {% endif %}
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.deyeinvertermaster_inverter_output_power') and has_value('sensor.deyeinvertermaster_battery_output_power') }}

      # ---------- Slave inverter sensors ----------
      - name: "deyeinverterslave_solar_power_used"
        unique_id: deyeinverterslave_solar_power_used
        state: >-
          {{ (states('sensor.deyeinverterslave_summary_day_pv') | float(0)
             - states('sensor.deyeinverterslave_summary_day_battery_charge') | float(0)) | round(1) }}
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: >-
          {{ has_value('sensor.deyeinverterslave_summary_day_pv') and has_value('sensor.deyeinverterslave_summary_day_battery_charge') }}

      - name: "deyeinverterslave_essential_load"
        unique_id: deyeinverterslave_essential_load
        state: >-
          {{ (states('sensor.deyeinverterslave_deyeinverterslave_output_power') | float(0)
             + (states('sensor.deyeinverterslave_grid_load') | float(0)
                - states('sensor.deyeinverterslave_aux_output_power') | float(0))) | round(0) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.deyeinverterslave_deyeinverterslave_output_power')
             and has_value('sensor.deyeinverterslave_grid_load')
             and has_value('sensor.deyeinverterslave_aux_output_power') }}

      - name: "deyeinverterslave_non_essential_load"
        unique_id: deyeinverterslave_non_essential_load
        state: >-
          {{ (states('sensor.deyeinverterslave_grid_power_ct_clamp') | float(0)
             - states('sensor.deyeinverterslave_grid_load') | float(0)) | round(0) }}
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.deyeinverterslave_grid_power_ct_clamp') and has_value('sensor.deyeinverterslave_grid_load') }}

      - name: "deyeinverterslave_priority_charge_or_load"
        unique_id: deyeinverterslave_priority_charge_or_load
        state: >-
          {% if is_state('select.deyeinverterslave_energy_management_model', 'Battery Priority Mode') %}
            off
          {% else %}
            on
          {% endif %}
        availability: >-
          {{ states('select.deyeinverterslave_energy_management_model') not in ['', 'unknown', 'unavailable'] }}

      - name: "deyeinverterslave_battery_charge_grid_power"
        unique_id: deyeinverterslave_battery_charge_grid_power
        state: >-
          {% if states('sensor.deyeinverterslave_inverter_output_power') | float(0) < 0.0 %}
            {{ (states('sensor.deyeinverterslave_battery_output_power') | float(0) | abs) * 0.001 }}
          {% else %}
            0.0
          {% endif %}
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        availability: >-
          {{ has_value('sensor.deyeinverterslave_inverter_output_power') and has_value('sensor.deyeinverterslave_battery_output_power') }}

      # ---------- Combined master+slave sensors ----------
      - name: "deyeinvertercombined_battery_soc"
        unique_id: deyeinvertercombined_battery_soc
        state: >-
          {% if (states('sensor.deyeinvertermaster_battery_soc') not in ['unknown','unavailable',''])
               and (states('sensor.deyeinverterslave_battery_soc') not in ['unknown','unavailable','']) %}
            {{ ((states('sensor.deyeinvertermaster_battery_soc') | float(0))
               + (states('sensor.deyeinverterslave_battery_soc') | float(0))) / 2.0 | round(1) }}
          {% else %}
            0.0
          {% endif %}
        availability: >-
          {{ (states('sensor.deyeinvertermaster_battery_soc') not in ['unknown','unavailable',''])
             and (states('sensor.deyeinverterslave_battery_soc') not in ['unknown','unavailable','']) }}
        unit_of_measurement: "%"
        device_class: battery

      - name: "deyeinvertercombined_battery_voltage"
        unique_id: deyeinvertercombined_battery_voltage
        state: >-
          {{ ((states('sensor.deyeinvertermaster_battery_voltage') | float(0))
             + (states('sensor.deyeinverterslave_battery_voltage') | float(0))) / 2.0 }}
        unit_of_measurement: "V"
        device_class: voltage
        availability: >-
          {{ has_value('sensor.deyeinvertermaster_battery_voltage') and has_value('sensor.deyeinverterslave_battery_voltage') }}

      - name: "deyeinvertercombined_summary_day_battery_charge"
