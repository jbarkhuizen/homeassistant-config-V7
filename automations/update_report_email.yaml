#===============================================================================
# DAILY UPDATE REPORT AUTOMATIONS
# File: automations/update_report_email.yaml
#===============================================================================

#-----------------------------------------------------------------------------
# 1) DAILY UPDATE REPORT - EMAIL NOTIFICATION (08:00)
#    Guarded by Maintenance Mode
#-----------------------------------------------------------------------------
- id: daily_update_status_report_email
  alias: "System: Daily Update Status Report at 08:00 (Email)"
  description: "Send daily report of available updates via Email at 08:00"

  trigger:
    - platform: time
      at: "08:00:00"

  condition:
    - condition: state
      entity_id: input_boolean.maintenance_mode
      state: "off"
    - condition: or
      conditions:
        - condition: template
          value_template: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) > 0 }}"
        - condition: time
          weekday:
            - mon

  action:
    - delay:
        seconds: 10

    - service: notify.email_notification_jbarkhuizen_gmail_com
      data:
        title: "📊 Daily Home Assistant Update Report - {{ now().strftime('%Y-%m-%d') }}"
        message: >-
          HOME ASSISTANT UPDATE REPORT

          Generated: {{ now().strftime('%A, %d %B %Y at %H:%M:%S') }}

          ================================================================================


          SUMMARY

          --------

          {{ state_attr('sensor.home_assistant_updates_summary', 'friendly_summary') | default('Checking updates...') }}


          Total Updates Available: {{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | default(0) }}


          {% if state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) > 0 %}

          AVAILABLE UPDATES

          -----------------

          {% for update in state_attr('sensor.home_assistant_updates_summary', 'updates_list') | default([]) %}

          {{ loop.index }}. {{ update }}

          {% endfor %}


          DETAILED STATUS

          ---------------

          {% set detailed = state_attr('sensor.home_assistant_updates_summary', 'detailed_status') | default({}) %}

          {% for component, details in detailed.items() %}

          {% if details.update_available %}


          {{ component }}:

            Status: UPDATE AVAILABLE

            Current Version: {{ details.current_version }}

            Latest Version: {{ details.latest_version }}

            {% if 'entity_id' in details %}Entity: {{ details.entity_id }}{% endif %}

          {% endif %}

          {% endfor %}


          {% if state_attr('sensor.home_assistant_updates_summary', 'has_critical_updates') %}

          ⚠️ CRITICAL UPDATES AVAILABLE ⚠️

          ---------------------------------

          Critical system components need updating. Please update as soon as possible:

          {% endif %}


          {% endif %}


          🕐 Checked: {{ state_attr('sensor.home_assistant_updates_summary', 'last_checked') | default(now().strftime('%Y-%m-%d %H:%M:%S')) }}

          🌐 IP: 192.168.1.30:8123

          📅 {{ now().strftime('%A, %d %B %Y at %H:%M') }}

    - service: system_log.write
      data:
        message: >-
          Daily update report sent - Total updates: {{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | default(0) }}
        level: info

  mode: single

#-----------------------------------------------------------------------------
# 2) DAILY AUTOMATIC UPDATES + SUCCESS / FAILURE NOTIFICATIONS (08:15)
#    Hardened with status sensor event firing & failure notices
#-----------------------------------------------------------------------------
- id: daily_automatic_updates_and_notifications_0815
  alias: "System: Daily Automatic Updates and Notifications at 08:15"
  description: >
    Automatically install available updates and report success or failure.
    Fires event 'auto_update_cycle_complete' for status sensor.

  trigger:
    - platform: time
      at: "08:15:00"

  condition:
    - condition: state
      entity_id: input_boolean.maintenance_mode
      state: "off"
    - condition: template
      value_template: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) > 0 }}"

  action:
    # (A1) Snapshot pre-update
    - variables:
        cycle_start: "{{ now() }}"
        pre_count: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) }}"
        core_on: "{{ is_state('update.home_assistant_core_update','on') }}"
        os_on: "{{ is_state('update.home_assistant_operating_system_update','on') }}"
        supervisor_on: "{{ is_state('update.home_assistant_supervisor_update','on') }}"
        attempted_entities: >
          {% set ignore = [] %}
          {% set base = states.update
             | selectattr('state','eq','on')
             | map(attribute='entity_id')
             | list %}
          {{ base }}

    - delay:
        seconds: 30 # allow sensors to settle more thoroughly before acting

    # (A2) Install core components individually
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ core_on | bool }}"
          sequence:
            - service: update.install
              target:
                entity_id: update.home_assistant_core_update
              data:
                backup: true
        - conditions:
            - condition: template
              value_template: "{{ os_on | bool }}"
          sequence:
            - service: update.install
              target:
                entity_id: update.home_assistant_operating_system_update
              data:
                backup: true
        - conditions:
            - condition: template
              value_template: "{{ supervisor_on | bool }}"
          sequence:
            - service: update.install
              target:
                entity_id: update.home_assistant_supervisor_update
              data:
                backup: true

    # (A3) Install all other add-on/integration updates
    - service: update.install
      data:
        backup: true
      target:
        entity_id: >
          {% set ignore = [
            'update.home_assistant_core_update',
            'update.home_assistant_operating_system_update',
            'update.home_assistant_supervisor_update'
          ] %}
          {% set others = states.update
              | selectattr('state','eq','on')
              | rejectattr('entity_id','in',ignore)
              | map(attribute='entity_id')
              | list %}
          {{ others }}

    # (A4) Wait for installations to start
    - delay:
        minutes: 3

    # (A5) Post-update snapshot
    - variables:
        post_count: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) }}"
        remaining_entities: >
          {% set still = states.update
              | selectattr('state','eq','on')
              | map(attribute='entity_id')
              | list %}
          {{ still }}
        restart_required: "{{ core_on or os_on or supervisor_on }}"
        duration_seconds: "{{ (as_timestamp(now()) - as_timestamp(cycle_start)) | int }}"

    # (A6) Determine status & detail
    - variables:
        status: >
          {% if pre_count == 0 %}
            no_updates
          {% elif post_count < pre_count %}
            success
          {% elif post_count == pre_count and pre_count > 0 and (remaining_entities | length) > 0 %}
            partial
          {% elif post_count == pre_count and pre_count > 0 and (remaining_entities | length) == 0 %}
            success
          {% else %}
            failure
          {% endif %}
        status_detail: >
          {% if status == 'success' %}
            Updates decreased from {{ pre_count }} to {{ post_count }}.
          {% elif status == 'partial' %}
            Some updates remain: {{ remaining_entities }}.
          {% elif status == 'failure' %}
            No reduction in update count ({{ pre_count }} -> {{ post_count }}).
          {% elif status == 'no_updates' %}
            No updates were pending.
          {% else %}
            Undefined status condition.
          {% endif %}

    # (A7) Conditional notifications based on status
    - choose:
        # Failure path
        - conditions:
            - condition: template
              value_template: "{{ status == 'failure' }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Auto Update Failure"
                message: >
                  Automatic update routine did not reduce available](#)
