#===============================================================================
# DAILY UPDATE REPORT AUTOMATIONS
# File: automations/update_report_email.yaml
# Purpose:
#   - Send a daily status report of Home Assistant updates via Email at 08:00
#   - (NEW) At 08:15, automatically run/install updates and send success
#           notifications via Email, Telegram, and persistent notification.
#===============================================================================

#-----------------------------------------------------------------------------
# EXISTING AUTOMATIONS
#-----------------------------------------------------------------------------
# NOTE: Keep all your existing automations at the top of this file.
# I am not removing or changing them here, just showing the known one below.
#-----------------------------------------------------------------------------

#-----------------------------------------------------------------------------
# 1) DAILY UPDATE REPORT - EMAIL NOTIFICATION (08:00)
#    Existing automation: "Daily Home Assistant Update Report"
#-----------------------------------------------------------------------------
- id: daily_update_status_report_email
  alias: "System: Daily Update Status Report at 08:00 (Email)"
  description: "Send daily report of available updates via Email at 08:00"

  trigger:
    - platform: time
      at: "08:00:00"

  condition:
    # Only send email if updates are available or it's Monday (weekly summary)
    - condition: or
      conditions:
        - condition: template
          value_template: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) > 0 }}"
        - condition: time
          weekday:
            - mon

  action:
    # 1.1) Wait for update sensors to stabilize
    - delay:
        seconds: 10

    # 1.2) Send Email Report
    - service: notify.email_notification_jbarkhuizen_gmail_com
      data:
        title: "📊 Daily Home Assistant Update Report - {{ now().strftime('%Y-%m-%d') }}"
        message: >-
          HOME ASSISTANT UPDATE REPORT

          Generated: {{ now().strftime('%A, %d %B %Y at %H:%M:%S') }}

          ================================================================================


          SUMMARY

          --------

          {{ state_attr('sensor.home_assistant_updates_summary', 'friendly_summary') | default('Checking updates...') }}


          Total Updates Available: {{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | default(0) }}


          {% if state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) > 0 %}

          AVAILABLE UPDATES

          -----------------

          {% for update in state_attr('sensor.home_assistant_updates_summary', 'updates_list') | default([]) %}

          {{ loop.index }}. {{ update }}

          {% endfor %}


          DETAILED STATUS

          ---------------

          {% set detailed = state_attr('sensor.home_assistant_updates_summary', 'detailed_status') | default({}) %}

          {% for component, details in detailed.items() %}

          {% if details.update_available %}


          {{ component }}:

            Status: UPDATE AVAILABLE

            Current Version: {{ details.current_version }}

            Latest Version: {{ details.latest_version }}

            {% if 'entity_id' in details %}Entity: {{ details.entity_id }}{% endif %}

          {% endif %}

          {% endfor %}


          {% if state_attr('sensor.home_assistant_updates_summary', 'has_critical_updates') %}

          ⚠️ CRITICAL UPDATES AVAILABLE ⚠️

          ---------------------------------

          Critical system components need updating. Please update as soon as possible:

          {% endif %}


          {% endif %}


          🕐 Checked: {{ state_attr('sensor.home_assistant_updates_summary', 'last_checked') | default(now().strftime('%Y-%m-%d %H:%M:%S')) }}

          🌐 IP: 192.168.1.30:8123

          📅 {{ now().strftime('%A, %d %B %Y at %H:%M') }}

    # 1.3) Log the report
    - service: system_log.write
      data:
        message: >-
          Daily update report sent - Total updates: {{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | default(0) }}
        level: info

  mode: single


#-----------------------------------------------------------------------------
# NEW AUTOMATION
#-----------------------------------------------------------------------------
# 2) DAILY AUTOMATIC UPDATES + SUCCESS NOTIFICATIONS (08:15)
#    This is what you asked to add.
#    It:
#      - Triggers at 08:15
#      - Installs Core / OS / Supervisor / Add-on updates
#      - Sends success email, Telegram, and persistent notification
#      - Logs result to system_log
#-----------------------------------------------------------------------------
- id: daily_automatic_updates_and_notifications_0815
  alias: "System: Daily Automatic Updates and Notifications at 08:15"
  description: >
    At 08:15, automatically install Home Assistant and add-on updates
    (when available) and send a success notification via Email, Telegram,
    and persistent notification.

  trigger:
    - platform: time
      at: "08:15:00"

  condition:
    # 2.1) Only attempt updates if there are actually updates available
    - condition: template
      value_template: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) > 0 }}"

  action:
    # 2.2) Small delay to allow 08:00 report & sensors to complete
    - delay:
        minutes: 1

    # 2.3) Install Core, OS, Supervisor updates individually if available
    - choose:
        # 2.3.1) Home Assistant Core
        - conditions:
            - condition: state
              entity_id: update.home_assistant_core_update
              state: "on"
          sequence:
            - service: update.install
              target:
                entity_id: update.home_assistant_core_update
              data:
                backup: true

        # 2.3.2) Home Assistant Operating System
        - conditions:
            - condition: state
              entity_id: update.home_assistant_operating_system_update
              state: "on"
          sequence:
            - service: update.install
              target:
                entity_id: update.home_assistant_operating_system_update
              data:
                backup: true

        # 2.3.3) Home Assistant Supervisor
        - conditions:
            - condition: state
              entity_id: update.home_assistant_supervisor_update
              state: "on"
          sequence:
            - service: update.install
              target:
                entity_id: update.home_assistant_supervisor_update
              data:
                backup: true

    # 2.4) Install other add-on / integration updates generically
    #
    #   - Loops all 'update' entities
    #   - Skips the three core ones handled above
    #   - Installs any that are 'on'
    - service: update.install
      data:
        backup: true
      target:
        entity_id: >
          {% set ignore = [
              'update.home_assistant_core_update',
              'update.home_assistant_operating_system_update',
              'update.home_assistant_supervisor_update'
          ] %}
          {% set updates = states.update
              | selectattr('state', 'eq', 'on')
              | rejectattr('entity_id', 'in', ignore)
              | map(attribute='entity_id')
              | list %}
          {{ updates }}

    # 2.5) Wait a bit to let installations start/settle
    #      (Big updates may still be running after this)
    - delay:
        minutes: 3

    # 2.6) Calculate a simple post-update summary
    - variables:
        before_count: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) }}"
        now_count: "{{ state_attr('sensor.home_assistant_updates_summary', 'total_updates') | int(0) }}"
        friendly_summary: "{{ state_attr('sensor.home_assistant_updates_summary', 'friendly_summary') | default('Update summary not available') }}"

    # 2.7) Send success EMAIL notification
    - service: notify.email_notification_jbarkhuizen_gmail_com
      data:
        title: "✅ Home Assistant Updates Installed - {{ now().strftime('%Y-%m-%d') }}"
        message: >-
          HOME ASSISTANT AUTOMATED UPDATE SUMMARY

          Time: {{ now().strftime('%A, %d %B %Y at %H:%M:%S') }}

          IP: 192.168.1.30:8123
          Cloud: https://gy98slwcfto2t5oia2xnqjeabx480gs6.ui.nabu.casa/

          ------------------------------------------------------------------------
          RESULT
          ------------------------------------------------------------------------

          Updates were automatically triggered at approximately 08:15.

          Previous total updates detected: {{ before_count }}
          Current total updates reported:  {{ now_count }}

          Summary:
          {{ friendly_summary }}

          Note:
          - Large updates (OS / Supervisor) may still be applying.
          - A restart may be required.
          Check the Supervisor and Updates dashboards in Home Assistant
          if anything still shows as pending.

    # 2.8) Send success TELEGRAM notification
    #
    # Telegram service: telegram_bot.send_message
    # You must provide at least 'target' (chat_id or list of chat_ids) and 'message'.
    # Replace 123456789 with your real chat_id.
    - service: telegram_bot.send_message
      data:
        target:
          - 123456789
        message: >-
          ✅ *Home Assistant Automated Updates Completed*

          Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

          *Previous updates:* {{ before_count }}
          *Current updates:*  {{ now_count }}

          _Summary:_ {{ friendly_summary }}

          Check the Home Assistant *Updates* and *Supervisor* pages
          for more detail.
        parse_mode: markdown

    # 2.9) Send success notification in the UI (Persistent Notification)
    - service: persistent_notification.create
      data:
        title: "Home Assistant Automated Updates"
        message: >-
          ✅ Home Assistant automatic update routine has been executed.

          Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

          Previous total updates detected: {{ before_count }}
          Current total updates reported:  {{ now_count }}

          Summary:
          {{ friendly_summary }}

          For details, open *Settings → System → Updates* and the Supervisor panel.

        notification_id: "ha_automatic_updates_status"

    # 2.10) Log to system_log for auditing
    - service: system_log.write
      data:
        message: >-
          Automatic updates routine run at {{ now().strftime('%Y-%m-%d %H:%M:%S') }}.
          Before: {{ before_count }} updates. Now: {{ now_count }} updates.
        level: info

  mode: single