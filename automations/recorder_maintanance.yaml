# Recorder & Database Health Maintenance
#
# Daily at 09h00:
#   - Compare current DB size vs baseline (baseline stored at previous 09h00)
#   - If percent growth > threshold (input_number.homeassistant_db_growth_threshold_percent)
#     AND absolute increase > 250 MB:
#       -> Persistent notification
#       -> Trigger recorder.purge (keep_days: 30, repack: true)
#   - Update baseline to current size
#
# Startup:
#   - Initialize baseline if zero and DB size > 0
#
# Entities required:
#   sensor.homeassistant_db_size_mb
#   input_number.homeassistant_db_baseline_mb
#   input_number.homeassistant_db_growth_threshold_percent
#
# Services used:
#   recorder.purge

- id: recorder_initialize_baseline
  alias: "Database - Initialize Baseline (Startup)"
  description: "Set initial DB size baseline after restart if not set."
  mode: single
  trigger:
    - platform: homeassistant
      event: start
  action:
    - variables:
        current: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
        baseline: "{{ states('input_number.homeassistant_db_baseline_mb') | float(0) }}"
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ baseline == 0 and current > 0 }}"
          sequence:
            - service: input_number.set_value
              target:
                entity_id: input_number.homeassistant_db_baseline_mb
              data:
                value: "{{ current }}"
      default: []

- id: recorder_daily_growth_check
  alias: "Database - Daily 09h00 Growth Check"
  description: "Evaluate DB growth; purge & repack if abnormal."
  mode: single
  trigger:
    - platform: time
      at: "09:00:00"
  action:
    - variables:
        current: "{{ states('sensor.homeassistant_db_size_mb') | float(0) }}"
        baseline: "{{ states('input_number.homeassistant_db_baseline_mb') | float(0) }}"
        threshold_percent: "{{ states('input_number.homeassistant_db_growth_threshold_percent') | float(20) }}"
        diff_mb: "{{ (current - baseline) | round(2) }}"
        pct_growth: >
          {% if baseline > 0 %}
            {{ ((current - baseline) / baseline * 100) | round(2) }}
          {% else %}
            0
          {% endif %}
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ pct_growth > threshold_percent and diff_mb > 250 }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Database Growth Alert"
                message: >
                  Home Assistant DB size increased abnormally.
                  Previous baseline (09h00 yesterday): {{ baseline }} MB
                  Current size: {{ current }} MB
                  Increase: {{ diff_mb }} MB ({{ pct_growth }}%)
                  Threshold: {{ threshold_percent }}%
                  Action: Initiating purge & repack (keep 30 days).
                  Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
            - service: recorder.purge
              data:
                keep_days: 30
                repack: true
        - conditions:
            - condition: template
              value_template: "{{ pct_growth <= threshold_percent or diff_mb <= 250 }}"
          sequence:
            - service: persistent_notification.create
              data:
                title: "Database Daily Check"
                message: >
                  Database size within normal range.
                  Baseline: {{ baseline }} MB
                  Current: {{ current }} MB
                  Change: {{ diff_mb }} MB ({{ pct_growth }}%)
                  Threshold: {{ threshold_percent }}%
                  Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
    - service: input_number.set_value
      target:
        entity_id: input_number.homeassistant_db_baseline_mb
      data:
        value: "{{ current }}"