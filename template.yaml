    # -------------------------
    # Inverter Automations
    # -------------------------

  - name: "Automation InverterConfig Update Times Last Run"
    unique_id: automation_inverterconfig_update_times_last_run
    state: >
      {% set t = state_attr('automation.inverterconfig_update_times', 'last_triggered') %}
      {% if t is not none %}
        {{ t.astimezone(now().tzinfo).strftime('%Y-%m-%d %H:%M:%S') }}
      {% else %}
        Never
      {% endif %}
    icon: mdi:clock-end

  - name: "Automation InverterConfig Update Times Status"
    unique_id: automation_inverterconfig_update_times_status
    state: >
      {% if is_state('automation.inverterconfig_update_times', 'on') %}
        Enabled
      {% else %}
        Disabled
      {% endif %}
    icon: mdi:toggle-switch

