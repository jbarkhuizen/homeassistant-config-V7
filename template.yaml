# ------------------------------------------------------------------------------
# (1) Trigger-based Template Sensor: Auto Update Status (existing)
# ------------------------------------------------------------------------------
template:
  - trigger:
      - platform: event
        event_type: auto_update_cycle_complete
    sensor:
      - name: "Auto Update Status"
        unique_id: auto_update_status
        icon: >
          {% set status = trigger.event.data.status %}
          {% if status == 'success' %}mdi:update
          {% elif status == 'partial' %}mdi:update-alert
          {% elif status == 'failure' %}mdi:alert-circle-outline
          {% elif status == 'no_updates' %}mdi:update-off
          {% else %}mdi:progress-clock{% endif %}
        state: "{{ trigger.event.data.status }}"
        attributes:
          last_run: "{{ trigger.event.data.last_run }}"
          pre_count: "{{ trigger.event.data.pre_count }}"
          post_count: "{{ trigger.event.data.post_count }}"
          attempted_entities: "{{ trigger.event.data.attempted_entities }}"
          remaining_entities: "{{ trigger.event.data.remaining_entities }}"
          duration_seconds: "{{ trigger.event.data.duration_seconds }}"
          restart_required: "{{ trigger.event.data.restart_required }}"
          status_detail: "{{ trigger.event.data.status_detail }}"

# ------------------------------------------------------------------------------
# (2) NEW: Trigger-based Template Sensor: Backup Health Status
#     Populated by event 'backup_health_cycle_complete'
# ------------------------------------------------------------------------------
  - trigger:
      - platform: event
        event_type: backup_health_cycle_complete
    sensor:
      - name: "Backup Health Status"
        unique_id: backup_health_status
        icon: >
          {% set status = trigger.event.data.status %}
          {% if status == 'success' %}mdi:backup-restore
          {% elif status == 'warning' %}mdi:progress-alert
          {% elif status == 'failure' %}mdi:alert-circle
          {% else %}mdi:progress-clock{% endif %}
        state: "{{ trigger.event.data.status }}"
        attributes:
          last_run: "{{ trigger.event.data.last_run }}"
          last_success: "{{ trigger.event.data.last_success }}"
          last_attempt: "{{ trigger.event.data.last_attempt }}"
          next_backup: "{{ trigger.event.data.next_backup }}"
          age_hours: "{{ trigger.event.data.age_hours }}"
          manager_state: "{{ trigger.event.data.manager_state }}"
          status_detail: "{{ trigger.event.data.status_detail }}"
          threshold_hours: "{{ trigger.event.data.threshold_hours }}"